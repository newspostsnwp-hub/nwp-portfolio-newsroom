name: Refresh portfolio news

on:
  workflow_dispatch:

  schedule:
    - cron: "30 7 * * 1-5"
      timezone: "Europe/London"

concurrency:
  group: portfolio-news-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    name: Collect and publish portfolio news
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out latest main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Collect news and generate drafts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite
          LOOKBACK_DAYS: "20"
          MAX_PER_COMPANY: "10"
          MIN_SCORE: "55"
          READY_SCORE: "80"
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/update_news.py

      - name: Validate generated news data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          news_file = Path("site/data/news.json")

          if not news_file.exists():
              raise SystemExit("site/data/news.json was not created.")

          with news_file.open("r", encoding="utf-8") as file:
              data = json.load(file)

          required_fields = {"generated_at", "lookback_days", "story_count", "stories"}
          missing_fields = required_fields - set(data)

          if missing_fields:
              raise SystemExit(f"news.json is missing fields: {sorted(missing_fields)}")

          if not isinstance(data["stories"], list):
              raise SystemExit("The stories field must be a JSON list.")

          if data["story_count"] != len(data["stories"]):
              raise SystemExit("story_count does not match the number of stories.")

          print(f"Validated news.json with {data['story_count']} stories.")
          PY

      - name: Commit refreshed news data
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "nwp-news-bot"
          git config user.email "actions@users.noreply.github.com"

          git add site/data/news.json

          if git diff --cached --quiet; then
            echo "No news data changed. Nothing to commit."
            exit 0
          fi

          git commit -m "Refresh portfolio news"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} of 3"

            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "Refreshed news data pushed successfully."
              exit 0
            fi

            echo "The remote branch changed. Retrying shortly."
            sleep $((attempt * 3))
          done

          echo "Unable to push after three attempts."
          exit 1
